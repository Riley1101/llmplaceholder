# fly.toml app configuration file generated for llmplaceholder on 2026-06-04T22:06:53-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'llmplaceholder'
primary_region = 'iad'

[build]

[env]
  ENV = 'production'
  PORT = '8080'

[[mounts]]
  source = 'llmplaceholder_data'
  destination = '/app/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 80

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
