{{define "tenant-sidebar"}}
{{if .Tenants}}
  {{range .Tenants}}
  <div class="tenant-item" data-tid="{{.ID}}"
       hx-get="/ui/tenants/{{.ID | pathEscape}}"
       hx-target="#tenant-detail"
       hx-swap="innerHTML"
       onclick="setActiveTenant(this)">
    {{if .IsGlobal}}
    <span class="w-1.5 h-1.5 rounded-full bg-slate-600 shrink-0" title="Global tenant"></span>
    {{else}}
    <span class="w-1.5 h-1.5 rounded-full bg-accent shrink-0"></span>
    {{end}}
    <span class="truncate flex-1">{{if .Name}}{{.Name}}{{else}}{{.ID}}{{end}}</span>
    {{if .IsGlobal}}<span class="text-[9px] font-mono text-slate-700 shrink-0">global</span>{{end}}
  </div>
  {{end}}
{{else}}
<div class="text-[12px] text-slate-600 px-3 py-4 text-center">No tenants.</div>
{{end}}
{{end}}

{{define "tenant-detail-empty"}}
<div class="flex flex-1 items-center justify-center h-full">
  <p class="text-sm text-slate-600">Select a tenant to manage it.</p>
</div>
{{end}}
