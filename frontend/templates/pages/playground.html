{{define "footer"}}{{end}}

{{define "content"}}
<div class="flex flex-col bg-base text-slate-200" style="height:calc(100vh - 3.5rem)">

  <!-- ── Tab strip ─────────────────────────────────────────────────────────── -->
  <div class="shrink-0 flex items-center gap-1 px-4 border-b border-slate-800">
    <button type="button" onclick="showPanel('playground')" data-panel="playground"
      class="dash-tab active px-4 h-10 text-[13px] font-semibold transition-colors">
      Playground
    </button>
    <button type="button" onclick="showPanel('tenants')" data-panel="tenants"
      class="dash-tab px-4 h-10 text-[13px] font-semibold transition-colors">
      Tenants
    </button>
    <button type="button" onclick="showPanel('global-scenarios')" data-panel="global-scenarios"
      class="dash-tab px-4 h-10 text-[13px] font-semibold transition-colors">
      Global Scenarios
    </button>
  </div>

  <!-- ── Playground panel ─────────────────────────────────────────────────── -->
  <div id="panel-playground" class="flex flex-1 min-h-0">
    <!-- Request column -->
    <div class="flex flex-col gap-4 p-5 w-80 xl:w-96 shrink-0 border-r border-slate-800 overflow-y-auto">
      <div class="flex flex-col gap-1.5">
        <label class="label">Tenant</label>
        <select id="pg-tenant" onchange="loadPgSettings();loadKeywords(this.value)"
          class="cursor-pointer bg-raised border border-slate-700 text-slate-200 text-[13px] font-mono rounded-lg px-3 py-2 focus:outline-none focus:border-accent/40">
          <option value="">Loading…</option>
        </select>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-[12px] font-medium text-slate-400">Include global MCP tools</span>
        <button type="button" id="pg-global-toggle" onclick="togglePgGlobalTools()"
          class="relative cursor-pointer w-9 h-[18px] rounded-full transition-colors bg-accent shrink-0"
          aria-label="Include global MCP tools"
          aria-pressed="true">
          <span id="pg-global-knob"
            class="absolute top-0.5 left-0.5 w-3.5 h-3.5 rounded-full bg-white transition-transform translate-x-[18px]"></span>
        </button>
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="label">Protocol</label>
        <div class="flex gap-2">
          <button type="button" id="proto-openai" onclick="setProtocol('openai',this)"
            class="proto-btn cursor-pointer px-4 py-1.5 rounded-full text-[12.5px] font-semibold bg-accent/10 text-accent border border-accent/25 transition-colors">OpenAI</button>
          <button type="button" id="proto-anthropic" onclick="setProtocol('anthropic',this)"
            class="proto-btn cursor-pointer px-4 py-1.5 rounded-full text-[12.5px] font-semibold text-slate-400 border border-slate-700 hover:text-slate-200 hover:border-slate-600 transition-colors">Anthropic</button>
          <button type="button" id="proto-mcp" onclick="setProtocol('mcp',this)"
            class="proto-btn cursor-pointer px-4 py-1.5 rounded-full text-[12.5px] font-semibold text-slate-400 border border-slate-700 hover:text-slate-200 hover:border-slate-600 transition-colors">MCP</button>
        </div>
      </div>
      <div class="flex items-center gap-2 bg-raised border border-slate-700 rounded-lg px-3 py-2">
        <span class="badge-post shrink-0">POST</span>
        <code id="pg-endpoint" class="font-mono text-[13px] text-slate-200">/v1/chat/completions</code>
      </div>
      <div class="flex flex-col gap-1.5 flex-1">
        <label class="label">Request body</label>
        <textarea id="pg-body" spellcheck="false"
          class="flex-1 min-h-[240px] bg-raised border border-slate-700 rounded-lg text-[12.5px] font-mono text-slate-300 leading-relaxed px-4 py-3 resize-none w-full focus:outline-none focus:border-accent/40"></textarea>
      </div>
      <button type="button" onclick="sendRequest()"
        class="cursor-pointer w-full bg-accent/20 text-accent font-bold text-sm rounded-full py-2.5 border border-accent/30 hover:bg-accent/30 transition-colors shrink-0">
        <span id="send-label">Send Request</span>
      </button>
    </div>
    <!-- Response column -->
    <div class="flex flex-col flex-1 min-w-0 min-h-0">
      <div class="flex items-center justify-between px-5 py-3 border-b border-slate-800 bg-black/20 shrink-0">
        <span class="label">Response</span>
        <span id="response-status" class="font-mono text-[11px] font-bold"></span>
      </div>
      <pre id="pg-output"
        class="flex-1 p-5 font-mono text-[12.5px] text-slate-400 leading-relaxed overflow-auto whitespace-pre-wrap break-words min-h-0">// Hit "Send Request" to see the response here.</pre>
    </div>

    <!-- Keywords panel -->
    <div class="flex flex-col w-52 xl:w-60 shrink-0 border-l border-slate-800 min-h-0">
      <div class="px-4 py-3 border-b border-slate-800 shrink-0 bg-black/20">
        <span class="label">Keywords</span>
        <p class="text-[10.5px] text-slate-600 mt-0.5">Click to use as prompt</p>
      </div>
      <div id="keywords-list" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3">
        <div class="text-[11px] text-slate-600 text-center py-4">Select a tenant</div>
      </div>
    </div>
  </div>

  <!-- ── Tenants panel ────────────────────────────────────────────────────── -->
  <div id="panel-tenants" class="hidden flex flex-1 min-h-0">

    <!-- Sidebar -->
    <div class="flex flex-col w-56 xl:w-64 shrink-0 border-r border-slate-800 min-h-0">
      <form class="p-3 border-b border-slate-800 shrink-0"
        hx-post="/ui/tenants"
        hx-target="#tenant-detail"
        hx-swap="innerHTML"
        hx-on::after-request="this.reset()">
        <div class="flex gap-2">
          <input name="tenant_id" type="text" placeholder="new tenant id" spellcheck="false"
            class="flex-1 min-w-0 bg-raised border border-slate-700 text-slate-200 text-[12px] font-mono rounded-lg px-2.5 py-1.5 focus:outline-none focus:border-accent/40 placeholder:text-slate-600" />
          <button type="submit" aria-label="Add tenant"
            class="cursor-pointer shrink-0 bg-accent/20 text-accent font-bold text-[12px] px-3 py-1.5 rounded-lg border border-accent/30 hover:bg-accent/30 transition-colors">+</button>
        </div>
      </form>
      <div id="tenant-sidebar-list"
           hx-get="/ui/tenants"
           hx-trigger="load-tenants"
           class="flex-1 overflow-y-auto py-1">
        <div class="text-[12px] text-slate-600 px-3 py-4 text-center">Loading…</div>
      </div>
    </div>

    <!-- Detail panel -->
    <div id="tenant-detail" class="flex flex-col flex-1 min-w-0 min-h-0">
      <div class="flex flex-1 items-center justify-center">
        <p class="text-sm text-slate-600">Select a tenant to manage it.</p>
      </div>
    </div>
  </div>

  <!-- ── Global Scenarios panel ──────────────────────────────────────────── -->
  <div id="panel-global-scenarios" class="hidden flex flex-1 min-h-0">
    <!-- Left: form -->
    <div class="flex flex-col w-80 xl:w-96 shrink-0 border-r border-slate-800 overflow-y-auto">
      <form class="p-5 flex flex-col gap-3"
        hx-post="/ui/global-scenarios"
        hx-target="#global-sc-paged"
        hx-swap="outerHTML"
        hx-on::after-request="this.reset()">
        <div class="flex flex-col gap-1.5">
          <label class="label">Keywords <span class="normal-case font-normal text-slate-600">(comma-separated)</span></label>
          <input name="keywords" type="text" placeholder="invoice, billing, payment"
            class="bg-raised border border-slate-700 text-slate-200 text-[12.5px] font-mono rounded-lg px-3 py-2 focus:outline-none focus:border-accent/40 placeholder:text-slate-600" />
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="label">Response</label>
          <textarea name="response" rows="5" placeholder="The mock response text to stream back…"
            class="bg-raised border border-slate-700 text-slate-300 text-[12.5px] rounded-lg px-3 py-2 resize-none focus:outline-none focus:border-accent/40 placeholder:text-slate-600"></textarea>
        </div>
        <button type="submit"
          class="cursor-pointer bg-accent/20 text-accent font-bold text-[13px] px-5 py-2 rounded-full border border-accent/30 hover:bg-accent/30 transition-colors">
          Add scenario
        </button>
      </form>
    </div>
    <!-- Right: list -->
    <div class="flex-1 overflow-y-auto"
      hx-get="/ui/global-scenarios"
      hx-trigger="load-global-scenarios">
      <div class="text-[12px] text-slate-600 text-center py-8">Loading…</div>
    </div>
  </div>

</div>

<style>
  .label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:rgb(100 116 139); }
  .dash-tab { color:rgb(100 116 139); border-bottom:2px solid transparent; margin-bottom:-1px; }
  .dash-tab:hover { color:white; }
  .dash-tab.active { color:white; border-bottom-color:var(--accent); }
  .detail-tab { color:rgb(100 116 139); padding: 0 12px; height:100%; display:flex; align-items:center; border-bottom:2px solid transparent; margin-bottom:-1px; }
  .detail-tab:hover { color:white; }
  .detail-tab.active { color:white; border-bottom-color:var(--accent); }
  .tenant-item { display:flex; align-items:center; gap:8px; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:12.5px; font-family:monospace; color:rgb(148 163 184); transition:background .1s,color .1s; }
  .tenant-item:hover { background:rgb(var(--color-surface)); color:white; }
  .tenant-item.active { background:rgb(var(--color-surface)); color:white; }
.chaos-btn { color:rgb(148 163 184); border-color:rgb(51 65 85); }
  .chaos-btn:hover { color:white; border-color:rgb(71 85 105); }
  .chaos-btn.active { color:var(--accent); background:var(--accent-10); border-color:var(--accent-30); }
  .badge-post { color: var(--pink); background: var(--pink-10); border-color: var(--pink-30); }
</style>

<script>
  // ── Panel / tab helpers (HTMX drives the content; these manage active classes)
  function showPanel(name) {
    document.querySelectorAll("[id^='panel-']").forEach(el => el.classList.add("hidden"));
    document.getElementById("panel-" + name).classList.remove("hidden");
    document.querySelectorAll(".dash-tab").forEach(b => b.classList.remove("active"));
    document.querySelector(`[data-panel="${name}"]`).classList.add("active");
    if (name === "tenants") htmx.trigger(document.getElementById("tenant-sidebar-list"), "load-tenants");
    if (name === "global-scenarios") htmx.trigger(document.querySelector("#panel-global-scenarios [hx-trigger]"), "load-global-scenarios");
  }

  function setDetailTab(btn) {
    document.querySelectorAll(".detail-tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  }

  function setActiveTenant(el) {
    document.querySelectorAll(".tenant-item").forEach(i => i.classList.remove("active"));
    el.classList.add("active");
  }

  // ── Keywords panel ─────────────────────────────────────────────────────────
  async function loadKeywords(id) {
    const list = document.getElementById("keywords-list");
    if (!id) {
      list.innerHTML = `<div class="text-[11px] text-slate-600 text-center py-4">Select a tenant</div>`;
      return;
    }
    list.innerHTML = `<div class="text-[11px] text-slate-600 text-center py-4">Loading…</div>`;
    try {
      const data      = await fetch(`/admin/tenants/${encodeURIComponent(id)}/scenarios`).then(r => r.json());
      const scenarios = (data.scenarios || []).filter(s => s.keywords?.length);
      const parts     = [];

      for (const s of scenarios) {
        const label = s.response ? s.response.slice(0, 48) + (s.response.length > 48 ? "…" : "")
                                 : (s.tool_name || "Scenario");
        const chips = s.keywords.map(k =>
          `<button type="button" onclick="useKeyword(${JSON.stringify(k)})" aria-label="Use keyword: ${k}"
            class="cursor-pointer text-[11px] font-mono bg-raised border border-slate-700 hover:border-accent/40 hover:text-accent text-slate-400 rounded px-2 py-0.5 transition-colors text-left">${k}</button>`
        ).join("");
        parts.push(`<div class="flex flex-col gap-1.5">
          <p class="text-[10.5px] text-slate-600 leading-snug">${label}</p>
          <div class="flex flex-wrap gap-1">${chips}</div>
        </div>`);
      }

      const hint = getHint(id);
      if (hint !== "Hello! What can you help me with?") {
        parts.push(`<div class="flex flex-col gap-1.5">
          <p class="text-[10.5px] text-slate-600">Domain sample</p>
          <button type="button" onclick="useKeyword(${JSON.stringify(hint)})"
            class="cursor-pointer text-left text-[11px] text-slate-400 hover:text-accent bg-raised border border-slate-700 hover:border-accent/40 rounded-lg px-2.5 py-2 transition-colors leading-relaxed">${hint}</button>
        </div>`);
      }

      list.innerHTML = parts.length
        ? parts.join(`<div class="border-t border-slate-800/50"></div>`)
        : `<div class="text-[11px] text-slate-600 text-center py-4">No scenarios yet.<br>Add some in the Tenants tab.</div>`;
    } catch (e) {
      list.innerHTML = `<div class="text-[11px] text-red-400 text-center py-4">${e.message}</div>`;
    }
  }

  function useKeyword(kw) {
    const bodyEl = document.getElementById("pg-body");
    try {
      const body = JSON.parse(bodyEl.value);
      if (body.messages?.length) body.messages[body.messages.length - 1].content = kw;
      bodyEl.value = JSON.stringify(body, null, 2);
    } catch (_) {
      const tid = document.getElementById("pg-tenant").value;
      if (currentProtocol === "anthropic") {
        bodyEl.value = JSON.stringify({ model: "claude-opus-4-5", max_tokens: 1024, messages: [{ role: "user", content: kw }], stream: true }, null, 2);
      } else {
        bodyEl.value = JSON.stringify({ model: "gpt-4o", messages: [{ role: "user", content: kw }], stream: true }, null, 2);
      }
    }
  }

  // ── Tenant sidebar ─────────────────────────────────────────────────────────
  async function loadTenantSidebar() {
    const list = document.getElementById("tenant-sidebar-list");
    try {
      const data    = await fetch("/admin/tenants").then(r => r.json());
      const tenants = data.tenants || [];
      if (!tenants.length) {
        list.innerHTML = `<div class="text-[12px] text-slate-600 px-3 py-4 text-center">No tenants.</div>`;
        return;
      }
      list.innerHTML = tenants.map(t => `
        <div class="tenant-item ${t === selectedTenant ? "active" : ""}" data-tid="${t}" onclick="selectTenant('${t}')">
          <span class="w-1.5 h-1.5 rounded-full bg-accent shrink-0"></span>
          <span class="truncate">${t}</span>
        </div>
      `).join("");
    } catch (e) {
      list.innerHTML = `<div class="text-[12px] text-red-400 px-3 py-4 text-center">${e.message}</div>`;
    }
  }

  async function createTenant() {
    const input = document.getElementById("new-tenant-id");
    const msg   = document.getElementById("create-msg");
    const id    = input.value.trim();
    if (!id) return;
    try {
      const res  = await fetch("/admin/tenants", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ tenant_id: id }),
      });
      const data = await res.json();
      if (res.ok) {
        input.value = "";
        showMsg(msg, `✓ Created`, "green");
        await loadTenantSidebar();
        await loadTenants(); // refresh playground dropdown
        selectTenant(id);
      } else {
        showMsg(msg, `✗ ${data.error || res.statusText}`, "red");
      }
    } catch (e) { showMsg(msg, `✗ ${e.message}`, "red"); }
  }

  async function deleteTenant() {
    const id = selectedTenant;
    if (!id || !confirm(`Delete tenant "${id}"?`)) return;
    try {
      const res = await fetch(`/admin/tenants/${encodeURIComponent(id)}`, { method: "DELETE" });
      if (res.ok) {
        selectedTenant = "";
        document.getElementById("detail-empty").classList.remove("hidden");
        document.getElementById("detail-content").classList.add("hidden");
        await loadTenantSidebar();
        await loadTenants();
      }
    } catch (e) { alert(e.message); }
  }

  // ── Playground ─────────────────────────────────────────────────────────────
  const HINTS = {
    ecommerce:"Show me recent invoices and overdue accounts", devops:"What is the current deployment status?",
    homelab:"List all my home lab servers", kernel:"Help me debug this kernel panic",
    legal:"Summarize key clauses in this contract", retail:"Check current inventory levels",
    saas:"What is our current MRR and churn rate?", security:"Show recent security alerts and incidents",
  };
  function getHint(id) { for (const [k,v] of Object.entries(HINTS)) if (id.includes(k)) return v; return "Hello! What can you help me with?"; }
  function makeOpenAIBody(tid) { return JSON.stringify({model:"gpt-4o",messages:[{role:"user",content:getHint(tid)}],stream:true},null,2); }
  function makeAnthropicBody(tid) { return JSON.stringify({model:"claude-opus-4-5",max_tokens:1024,messages:[{role:"user",content:getHint(tid)}],stream:true},null,2); }
  const MCP_BODY = JSON.stringify({jsonrpc:"2.0",id:1,method:"tools/list",params:{}},null,2);
  let currentProtocol = "openai";
  const PROTO_ON  = "proto-btn cursor-pointer px-4 py-1.5 rounded-full text-[12.5px] font-semibold bg-accent/10 text-accent border border-accent/25 transition-colors";
  const PROTO_OFF = "proto-btn cursor-pointer px-4 py-1.5 rounded-full text-[12.5px] font-semibold text-slate-400 border border-slate-700 hover:text-slate-200 hover:border-slate-600 transition-colors";

  const PROTO_ENDPOINT = { openai: "/v1/chat/completions", anthropic: "/v1/messages", mcp: "/mcp/message" };

  function setProtocol(proto, btn) {
    currentProtocol = proto;
    document.querySelectorAll(".proto-btn").forEach(b => b.className = PROTO_OFF);
    btn.className = PROTO_ON;
    document.getElementById("pg-endpoint").textContent = PROTO_ENDPOINT[proto];
    const tid = document.getElementById("pg-tenant").value;
    if (proto === "openai") document.getElementById("pg-body").value = makeOpenAIBody(tid);
    else if (proto === "anthropic") document.getElementById("pg-body").value = makeAnthropicBody(tid);
    else document.getElementById("pg-body").value = MCP_BODY;
  }

  async function sendRequest() {
    const tenantId = document.getElementById("pg-tenant").value;
    const body     = document.getElementById("pg-body").value;
    const output   = document.getElementById("pg-output");
    const statusEl = document.getElementById("response-status");
    const label    = document.getElementById("send-label");
    if (!tenantId) { output.textContent = "Error: select a tenant first."; return; }
    const endpoint = PROTO_ENDPOINT[currentProtocol];
    label.textContent = "Sending…";
    output.textContent = "";
    statusEl.textContent = "";
    statusEl.className = "font-mono text-[11px] font-bold";
    try {
      const res = await fetch(endpoint, {
        method:"POST", headers:{"Content-Type":"application/json","X-Tenant-ID":tenantId}, body,
      });
      statusEl.textContent = res.status + " " + res.statusText;
      statusEl.className = "font-mono text-[11px] font-bold rounded-full px-2.5 py-0.5 " +
        (res.ok ? "text-emerald-400 bg-emerald-400/10" : "text-red-400 bg-red-400/10");
      const ct = res.headers.get("content-type") || "";
      if (ct.includes("event-stream")) {
        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let raw = "", text = "";
        while (true) {
          const {done, value} = await reader.read();
          if (done) break;
          raw += decoder.decode(value, {stream:true});
          const events = raw.split("\n\n");
          raw = events.pop();
          for (const event of events) {
            const lines = event.split("\n");
            let eventType = "", dataLine = "";
            for (const line of lines) {
              if (line.startsWith("event: ")) eventType = line.slice(7).trim();
              else if (line.startsWith("data: ")) dataLine = line.slice(6).trim();
            }
            if (!dataLine || dataLine === "[DONE]") continue;
            try {
              const parsed = JSON.parse(dataLine);
              if (eventType === "content_block_delta" || parsed.type === "content_block_delta") {
                if (parsed.delta?.text) text += parsed.delta.text;
              } else {
                const delta = parsed.choices?.[0]?.delta;
                if (delta?.content) text += delta.content;
              }
            } catch (_) {}
          }
          output.textContent = text || "…";
          output.scrollTop = output.scrollHeight;
        }
      } else {
        const text = await res.text();
        try { output.textContent = JSON.stringify(JSON.parse(text),null,2); } catch (_) { output.textContent = text; }
      }
    } catch (e) {
      output.textContent = "Network error: " + e.message;
      statusEl.textContent = "ERROR";
      statusEl.className = "font-mono text-[11px] font-bold text-red-400 bg-red-400/10 rounded-full px-2.5 py-0.5";
    } finally { label.textContent = "Send Request"; }
  }

  let pgGlobalTools = true;

  async function loadPgSettings() {
    const id = document.getElementById("pg-tenant").value;
    if (!id) return;
    try {
      const data = await fetch(`/admin/tenants/${encodeURIComponent(id)}/settings`).then(r => r.json());
      const v = data.settings?.include_global_tools;
      pgGlobalTools = v === undefined ? true : Boolean(v);
    } catch (_) {}
    renderPgToggle();
  }

  function renderPgToggle() {
    const btn  = document.getElementById("pg-global-toggle");
    const knob = document.getElementById("pg-global-knob");
    if (!btn) return;
    btn.setAttribute("aria-pressed", String(pgGlobalTools));
    btn.className = `relative cursor-pointer w-9 h-[18px] rounded-full transition-colors shrink-0 ${pgGlobalTools ? "bg-accent" : "bg-slate-700"}`;
    knob.className = `absolute top-0.5 left-0.5 w-3.5 h-3.5 rounded-full bg-white transition-transform ${pgGlobalTools ? "translate-x-[18px]" : "translate-x-0"}`;
  }

  async function togglePgGlobalTools() {
    const id = document.getElementById("pg-tenant").value;
    if (!id) return;
    pgGlobalTools = !pgGlobalTools;
    renderPgToggle();
    try {
      await fetch(`/admin/tenants/${encodeURIComponent(id)}/settings`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ include_global_tools: pgGlobalTools }),
      });
    } catch (_) {
      pgGlobalTools = !pgGlobalTools;
      renderPgToggle();
    }
  }

  async function loadTenants() {
    const sel = document.getElementById("pg-tenant");
    try {
      const data    = await fetch("/admin/tenants").then(r => r.json());
      const tenants = data.tenants || [];
      sel.innerHTML = tenants.map(t => `<option value="${t}">${t}</option>`).join("") || `<option value="">No tenants</option>`;
      const preselect = new URLSearchParams(location.search).get("tenant");
      if (preselect && tenants.includes(preselect)) sel.value = preselect;
      const active = sel.value || tenants[0] || "";
      if (active) document.getElementById("pg-body").value = makeOpenAIBody(active);
      loadPgSettings();
      loadKeywords(sel.value);
    } catch (e) { sel.innerHTML = `<option value="">Failed to load</option>`; }
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  loadTenants();
</script>
{{end}}
